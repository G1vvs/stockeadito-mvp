<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Stockeadito</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                📦 Stockeadito
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="userEmail" style="font-size: 0.9rem; opacity: 0.9;">Cargando...</span>
                <button class="btn btn-secondary" style="padding: 5px 15px; font-size: 0.8rem;" onclick="logout()">Salir</button>
            </div>
        </nav>
    </header>

    <main class="dashboard-container">
        
        <div class="chat-panel">
            <div class="chat-header">
                🤖 Asistente Stockeadito
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    ¡Hola! Soy Stockeadito, tu asistente de inventario. ¿En qué puedo ayudarte hoy?
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Escribe aquí (Ej: Vendí 2 cocas)..." autocomplete="off">
                <button class="btn btn-primary" onclick="sendMessage()">Enviar</button>
            </div>
        </div>

        <div class="data-panel">
            <div class="data-header">
                <h2>📦 Tu Inventario</h2>
                
                <div id="statusContainer">
                    </div>
            </div>

            <div class="table-container">
                <table id="inventoryTable">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th style="width: 100px;">Stock</th>
                            <th style="width: 120px;">Precio</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="3" style="text-align: center; color: gray;">Cargando datos...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="assets/js/app.js"></script>
</body>
</html>
